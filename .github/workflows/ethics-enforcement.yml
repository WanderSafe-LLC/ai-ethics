name: AI Ethics Enforcement

on:
  pull_request:
    paths:
      - 'tasks/**-prd-*.md'
      - 'docs/prd/**/*.md'
      - 'prd/**/*.md'
    branches:
      - main

jobs:
  check-ethics-section:
    name: PRD Ethics Section Required
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: |
            tasks/**-prd-*.md
            docs/prd/**/*.md
            prd/**/*.md

      - name: Check for AI Ethics section
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          FAILED=0
          for file in ${{ steps.changed.outputs.all_changed_files }}; do
            if [ -f "$file" ]; then
              if ! grep -q "^## AI Ethics & Risk" "$file"; then
                echo "::error file=$file::Missing required section: ## AI Ethics & Risk"
                FAILED=1
              else
                echo "::notice file=$file::Ethics section found"
              fi
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "=========================================="
            echo "ERROR: PRD files must include section:"
            echo ""
            echo "  ## AI Ethics & Risk"
            echo ""
            echo "This section must document:"
            echo "  - AI involvement (yes/no)"
            echo "  - Risk assessment"
            echo "  - Mitigation strategies"
            echo "  - Human oversight requirements"
            echo "=========================================="
            exit 1
          fi

  check-ethics-checklist:
    name: Ethics Checklist Validation
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'ai-feature')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ethics checklist
        run: |
          if [ ! -f "ethics-checklist.yml" ]; then
            echo "::error::AI feature PRs require ethics-checklist.yml"
            exit 1
          fi

          # Check required fields
          REQUIRED_FIELDS=(
            "ai_involved"
            "product_owner"
            "technical_owner"
            "ethics_review_completed"
            "bias_assessment_completed"
            "privacy_review_completed"
            "transparency_disclosure_written"
            "confidence_threshold_defined"
            "fallback_behavior_defined"
            "audit_logging_enabled"
            "release_approved"
          )

          MISSING=0
          for field in "${REQUIRED_FIELDS[@]}"; do
            if ! grep -q "^${field}:" ethics-checklist.yml; then
              echo "::error::Missing required field in ethics-checklist.yml: $field"
              MISSING=1
            fi
          done

          if [ $MISSING -eq 1 ]; then
            exit 1
          fi

          # Check that all boolean fields are not false for release
          if grep -q "release_approved: true" ethics-checklist.yml; then
            BLOCKERS=(
              "ethics_review_completed: false"
              "bias_assessment_completed: false"
              "privacy_review_completed: false"
              "transparency_disclosure_written: false"
              "audit_logging_enabled: false"
            )

            for blocker in "${BLOCKERS[@]}"; do
              if grep -q "$blocker" ethics-checklist.yml; then
                echo "::error::Cannot approve release with incomplete ethics requirements"
                echo "::error::Found: $blocker"
                exit 1
              fi
            done
          fi

          echo "Ethics checklist validation passed"
